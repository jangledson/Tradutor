<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    
    <title>Tradutor JGH NextGen V15</title>

    <style>
        :root {
            --bg-main: #020617;
            --glass: rgba(30, 41, 59, 0.7);
            --accent: #3b82f6;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --user-h: 220;
            --trans-h: 160;
            --chat-f-size: 16px;
            --chat-font: 'Inter', sans-serif; /* Variável para o Chat */
            --ui-font: 'Inter', system-ui, -apple-system, sans-serif; /* Fonte fixa para o Menu */
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: pan-x pan-y;
        }

        body {
            background-color: var(--bg-main);
            background-image: radial-gradient(circle at top right, #1e293b, transparent);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: var(--ui-font); /* Menu e Interface usam fonte fixa */
        }

        #pocket-mode {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000 !important;
            z-index: 99999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: all; 
            touch-action: none;
        }

        header { padding: 15px; background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .lang-grid { display: grid; grid-template-columns: 1fr 50px 1fr; align-items: center; gap: 10px; }
        select { background: rgba(15, 23, 42, 0.8); color: white; border: 1px solid var(--accent); padding: 12px; border-radius: 15px; font-size: 0.85rem; outline: none; appearance: none; text-align: center; width: 100%; font-family: var(--ui-font); }
        .swap-circle { width: 40px; height: 40px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; margin: 0 auto; }

        #chat-scroll { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* AS BOLHAS SÃO AS ÚNICAS QUE MUDAM A FONTE */
        .bubble { 
            max-width: 85%; 
            padding: 15px; 
            border-radius: 20px; 
            line-height: 1.5; 
            font-size: var(--chat-f-size); 
            font-family: var(--chat-font); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }
        
        .msg-user { align-self: flex-start; background: hsl(var(--user-h), 60%, 45%); border-bottom-left-radius: 5px; }
        .msg-bot { align-self: flex-end; background: hsl(var(--trans-h), 60%, 40%); border-bottom-right-radius: 5px; cursor: pointer; }

        .nav-bar { 
            background: var(--glass); backdrop-filter: blur(15px); padding: 10px 10px 30px; 
            display: grid; grid-template-columns: 1fr 1fr 80px 1fr 1fr; align-items: center; justify-items: center; border-top: 1px solid rgba(255,255,255,0.1); 
        }

        .btn-nav { background: none; border: none; color: var(--text-dim); font-size: 1.5rem; cursor: pointer; }
        .mic-btn { 
            grid-column: 3; width: 70px; height: 70px; background: var(--accent); color: white; 
            border-radius: 50%; margin-top: -45px; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4); border: 5px solid var(--bg-main); 
        }
        .mic-btn.active { background: #ef4444; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .full-modal { position: fixed; inset: 0; background: var(--bg-main); z-index: 100; display: none; flex-direction: column; padding: 25px; overflow-y: auto; font-family: var(--ui-font); }
        .setting-row { margin-bottom: 20px; }
        .setting-row label { display: block; font-size: 0.9rem; color: var(--text-dim); margin-bottom: 8px; }
        .color-bar { -webkit-appearance: none; width: 100%; height: 20px; border-radius: 10px; background: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000); }
        .color-bar-simple { -webkit-appearance: none; width: 100%; height: 15px; border-radius: 10px; background: #334155; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; font-family: var(--ui-font); }
        
        .hist-item { 
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 8px; 
            border-left: 4px solid var(--accent); font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; 
            font-family: var(--ui-font);
        }
        .del-hist { color: #ef4444; font-size: 1.2rem; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="pocket-mode"></div>

    <header>
        <div class="lang-grid">
            <select id="sl">
                <option value="pt">🇧🇷 Português</option><option value="en">🇺🇸 Inglês</option>
                <option value="es">🇪🇸 Espanhol</option><option value="fr">🇫🇷 Francês</option>
                <option value="it">🇮🇹 Italiano</option><option value="de">🇩🇪 Alemão</option>
                <option value="ja">🇯🇵 Japonês</option><option value="zh">🇨🇳 Chinês</option>
                <option value="ru">🇷🇺 Russo</option><option value="ko">🇰🇷 Coreano</option>
            </select>
            <div class="swap-circle" id="swap">⇄</div>
            <select id="tl">
                <option value="en" selected>🇺🇸 Inglês</option><option value="pt">🇧🇷 Português</option>
                <option value="es">🇪🇸 Espanhol</option><option value="fr">🇫🇷 Francês</option>
                <option value="it">🇮🇹 Italiano</option><option value="de">🇩🇪 Alemão</option>
                <option value="ja">🇯🇵 Japonês</option><option value="zh">🇨🇳 Chinês</option>
                <option value="ru">🇷🇺 Russo</option><option value="ko">🇰🇷 Coreano</option>
            </select>
        </div>
    </header>

    <main id="chat-scroll"></main>

    <div style="padding: 0 20px 10px;" onclick="openMod('modEdit')">
        <div style="background: var(--glass); padding: 18px; border-radius: 50px; text-align: center; color: var(--text-dim); border: 1px solid rgba(255,255,255,0.1); font-family: var(--ui-font);">
            ✏️ Digitar ou colar texto...
        </div>
    </div>

    <nav class="nav-bar">
        <button class="btn-nav" onclick="activateLock()">🔒</button>
        <button class="btn-nav" onclick="clearChat()">🧹</button>
        <button class="mic-btn" id="mic">🎤</button>
        <button class="btn-nav" onclick="openMod('modStudy')">📖</button>
        <button class="btn-nav" onclick="openMod('modSet')">⚙️</button>
    </nav>

    <div id="modSet" class="full-modal">
        <div style="color:var(--accent); font-weight:bold; margin-bottom:20px; font-size:1.2rem;">⚙️ Configurações</div>
        <div class="setting-row"><label>Velocidade Voz: <span id="vVal">1.0</span>x</label><input type="range" id="voiceSpeed" min="0.5" max="1.5" step="0.1" value="1.0" class="color-bar-simple"></div>
        <div class="setting-row"><label>Tamanho Letra: <span id="fsVal">16</span>px</label><input type="range" id="fs" min="14" max="34" value="16" class="color-bar-simple"></div>
        
        <div class="setting-row">
            <label>Fonte das Traduções</label>
            <select id="fontFamily">
                <option value="'Inter', sans-serif">Padrão</option>
                <option value="'Arial', sans-serif">Arial</option>
                <option value="'Georgia', serif">Georgia</option>
                <option value="'Courier New', monospace">Courier</option>
                <option value="'Verdana', sans-serif">Verdana</option>
                <option value="'Trebuchet MS', sans-serif">Trebuchet</option>
                <option value="'Times New Roman', serif">Times New Roman</option>
                <option value="'Lucida Console', monospace">Retro</option>
                <option value="'Comic Sans MS', cursive">Casual</option>
                <option value="'Impact', sans-serif">Impact</option>
            </select>
        </div>

        <div class="setting-row"><label>Cor Usuário</label><input type="range" id="h1" min="0" max="360" class="color-bar"></div>
        <div class="setting-row"><label>Cor Tradutor</label><input type="range" id="h2" min="0" max="360" class="color-bar"></div>
        
        <div style="font-weight:bold; margin: 10px 0; display: flex; justify-content: space-between;">📜 Histórico <span style="font-size: 0.7rem; color: #ef4444; cursor: pointer;" onclick="clearFullHist()">Limpar Tudo</span></div>
        <div id="histList"></div>
        
        <button class="btn-action" onclick="closeMod('modSet')" style="margin-top:20px;">Salvar e Sair</button>
    </div>

    <div id="modEdit" class="full-modal">
        <textarea id="txtIn" style="width:100%; flex:1; background:#1e293b; color:white; border-radius:20px; padding:20px; border:none; outline:none; font-size:1.1rem; font-family: var(--ui-font);"></textarea>
        <button class="btn-action" onclick="processTr()" style="margin-top:15px;">Traduzir</button>
        <button class="btn-nav" style="margin-top:10px; font-size: 1rem;" onclick="closeMod('modEdit')">Voltar</button>
    </div>

    <div id="modStudy" class="full-modal">
        <div style="color:var(--accent); font-weight:bold; margin-bottom:15px;">📖 Modo Estudo</div>
        <textarea id="txtStudy" style="width:100%; flex:1; background:#1e293b; color:white; border-radius:20px; padding:20px; border:none; font-family: var(--ui-font);"></textarea>
        <button class="btn-action" onclick="closeMod('modStudy')" style="margin-top:15px;">Fechar</button>
    </div>

    <script>
        const chat = document.getElementById('chat-scroll');
        const pocket = document.getElementById('pocket-mode');
        let rec = null;
        let isMicEnabled = false;

        function activateLock() {
            pocket.style.display = 'flex';
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                pocket.style.display = 'none';
                if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
            }
        });

        pocket.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); }, { passive: false });

        async function speak3x(text, lang) {
            window.speechSynthesis.cancel();
            const baseSpeed = parseFloat(document.getElementById('voiceSpeed').value);
            const codes = {'pt':'pt-BR','en':'en-US','es':'es-ES','fr':'fr-FR','it':'it-IT','de':'de-DE','ja':'ja-JP','zh':'zh-CN','ru':'ru-RU','ko':'ko-KR'};
            const langCode = codes[lang] || lang;

            const play = (t, s) => new Promise(r => {
                const u = new SpeechSynthesisUtterance(t);
                u.lang = langCode; u.rate = s;
                u.onend = () => setTimeout(r, 600);
                window.speechSynthesis.speak(u);
            });

            await play(text, baseSpeed);
            await play(text, baseSpeed * 0.4);
            const words = text.split(' ');
            for (let w of words) { await play(w, 0.6); }
        }

        function addBubble(o, t, lang) {
            const b1 = document.createElement('div'); b1.className = 'bubble msg-user'; b1.innerText = o;
            const b2 = document.createElement('div'); b2.className = 'bubble msg-bot'; b2.innerText = t;
            b2.onclick = () => speak3x(t, lang);
            chat.appendChild(b1); chat.appendChild(b2);
            chat.scrollTop = chat.scrollHeight;
            saveHist(o, t, lang);
        }

        async function translate(q, f, t) {
            try {
                const r = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(q)}&langpair=${f}|${t}`);
                const d = await r.json();
                return d.responseData.translatedText;
            } catch(e) { return "Erro na tradução"; }
        }

        async function processTr() {
            const val = document.getElementById('txtIn').value;
            const s = document.getElementById('sl').value;
            const t = document.getElementById('tl').value;
            if(val) { const res = await translate(val, s, t); addBubble(val, res, t); speak3x(res, t); }
            closeMod('modEdit'); document.getElementById('txtIn').value = "";
        }

        function initSpeech() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return;
            rec = new SR();
            rec.lang = document.getElementById('sl').value === 'pt' ? 'pt-BR' : document.getElementById('sl').value;
            rec.continuous = false;
            rec.interimResults = false;
            rec.onstart = () => { document.getElementById('mic').classList.add('active'); isMicEnabled = true; };
            rec.onend = () => { if (isMicEnabled) rec.start(); else document.getElementById('mic').classList.remove('active'); };
            rec.onresult = async (e) => {
                const text = e.results[0][0].transcript;
                const s = document.getElementById('sl').value;
                const t = document.getElementById('tl').value;
                const tr = await translate(text, s, t);
                addBubble(text, tr, t); speak3x(tr, t);
            };
        }

        document.getElementById('mic').onclick = function() {
            if (!rec) initSpeech();
            if (isMicEnabled) { isMicEnabled = false; rec.stop(); } 
            else { isMicEnabled = true; rec.lang = document.getElementById('sl').value === 'pt' ? 'pt-BR' : document.getElementById('sl').value; rec.start(); }
        };

        function saveHist(o, t, l) {
            let h = JSON.parse(localStorage.getItem('next_hist') || '[]');
            h.unshift({id: Date.now(), o, t, l});
            localStorage.setItem('next_hist', JSON.stringify(h.slice(0, 15)));
            renderHist();
        }

        function removeHist(id) {
            let h = JSON.parse(localStorage.getItem('next_hist') || '[]');
            h = h.filter(item => item.id !== id);
            localStorage.setItem('next_hist', JSON.stringify(h));
            renderHist();
        }

        function clearFullHist() { if(confirm("Apagar histórico?")) { localStorage.removeItem('next_hist'); renderHist(); } }

        function renderHist() {
            const h = JSON.parse(localStorage.getItem('next_hist') || '[]');
            const list = document.getElementById('histList');
            list.innerHTML = h.map(i => `<div class="hist-item"><div onclick="addBubble('${i.o.replace(/'/g,"\\'")}','${i.t.replace(/'/g,"\\'")}','${i.l}');closeMod('modSet')">${i.t.substring(0,30)}...</div><div class="del-hist" onclick="removeHist(${i.id})">×</div></div>`).join('');
        }

        function apply() {
            const h1 = document.getElementById('h1').value;
            const h2 = document.getElementById('h2').value;
            const fs = document.getElementById('fs').value;
            const font = document.getElementById('fontFamily').value;
            
            // Aplica fonte APENAS na variável do chat
            document.documentElement.style.setProperty('--chat-font', font);
            
            document.documentElement.style.setProperty('--user-h', h1);
            document.documentElement.style.setProperty('--trans-h', h2);
            document.documentElement.style.setProperty('--chat-f-size', fs + 'px');
            
            document.getElementById('fsVal').innerText = fs;
            document.getElementById('vVal').innerText = document.getElementById('voiceSpeed').value;
            
            localStorage.setItem('next_h1', h1); localStorage.setItem('next_h2', h2); 
            localStorage.setItem('next_fs', fs); localStorage.setItem('next_font', font);
        }

        ['h1','h2','fs','voiceSpeed','fontFamily'].forEach(id => document.getElementById(id).oninput = apply);
        document.getElementById('swap').onclick = () => {
            const s = document.getElementById('sl'); const t = document.getElementById('tl');
            const temp = s.value; s.value = t.value; t.value = temp;
        };

        window.onload = () => {
            document.getElementById('h1').value = localStorage.getItem('next_h1') || 220;
            document.getElementById('h2').value = localStorage.getItem('next_h2') || 160;
            document.getElementById('fs').value = localStorage.getItem('next_fs') || 16;
            document.getElementById('fontFamily').value = localStorage.getItem('next_font') || "'Inter', sans-serif";
            apply(); renderHist();
        };

        function openMod(id) { document.getElementById(id).style.display = 'flex'; }
        function closeMod(id) { document.getElementById(id).style.display = 'none'; }
        function clearChat() { if(confirm("Limpar tela?")) chat.innerHTML = ""; }
    </script>
</body>
</html>
